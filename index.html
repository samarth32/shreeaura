<head>

  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="YOUR_GSC_VERIFICATION_STRING_HERE" />
  <title>ShreeAura - Premium Corporate Solutions</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />

    content="ShreeAura provides premium corporate solutions for businesses. Discover our comprehensive range of services tailored to meet your company's needs." />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />

    content="ShreeAura provides premium corporate solutions for businesses. Discover our comprehensive range of services tailored to meet your company's needs." />

  <!-- Canonical Link (Optional but recommended) -->
  <link rel="canonical" href="https://shreeaura.com/" />

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ShreeAura",
    "url": "https://shreeaura.com/",
    "logo": "https://shreeaura.com/logo.png",

    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service"
    }
  }

  <!-- Google Analytics Tracking (Replace G-XXXXXXXXXX with your actual ID) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    #root {
      height: 100%;
    }
  </style>
</head>
